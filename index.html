<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Test Vueling</title>
<style>
  :root{
    --navy:#1B2250;
    --navy-dark:#12163a;
    --cream:#F7F5EF;
    --amber:#F0C348;
    --amber-deep:#C99A1F;
    --ok:#2E7D4F;
    --ok-bg:#E4F3EA;
    --bad:#B33F32;
    --bad-bg:#FBE9E6;
    --ink:#1B2250;
    --muted:#6b7086;
    --line:#E4E1D6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    background:var(--cream);
    color:var(--ink);
    min-height:100vh;
  }
  .mono{font-family:"SF Mono",SFMono-Regular,ui-monospace,"Courier New",monospace;}

  .app{max-width:640px;margin:0 auto;padding:0 0 60px;}

  .topbar{
    background:var(--navy);
    color:var(--cream);
    padding:22px 20px 18px;
    border-bottom:4px solid var(--amber);
  }
  .topbar .eyebrow{
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--amber);font-weight:700;margin-bottom:4px;
  }
  .topbar h1{margin:0;font-size:21px;font-weight:700;letter-spacing:-.01em;}
  .topbar .sub{font-size:12.5px;color:#B9BEDE;margin-top:3px;}

  /* --- Block picker --- */
  .picker{padding:22px 20px 8px;}
  .picker h2{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:0 0 12px;}
  .block-card{
    display:flex;align-items:center;gap:14px;
    background:#fff;border:1px solid var(--line);border-radius:10px;
    padding:16px 16px;margin-bottom:12px;cursor:pointer;
    transition:border-color .15s, transform .1s;
  }
  .block-card:hover{border-color:var(--amber-deep);}
  .block-card:active{transform:scale(.99);}
  .block-num{
    font-family:"SF Mono",SFMono-Regular,ui-monospace,monospace;
    font-size:20px;font-weight:700;color:var(--navy);
    background:var(--amber);width:42px;height:42px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .block-info h3{margin:0 0 2px;font-size:15px;}
  .block-info p{margin:0;font-size:12.5px;color:var(--muted);}
  .retry-card{
    background:var(--navy);color:var(--cream);border-radius:10px;
    padding:16px;margin:6px 0 18px;
  }
  .retry-card h3{margin:0 0 6px;font-size:14px;color:var(--amber);}
  .retry-card p{margin:0 0 12px;font-size:12.5px;color:#C4C8E4;}
  .retry-card button{
    background:var(--amber);color:var(--navy);border:none;border-radius:7px;
    padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer;
  }

  /* --- Quiz header --- */
  .quiz-head{
    display:flex;justify-content:space-between;align-items:center;
    padding:16px 20px 10px;
  }
  .quiz-head .qnum{
    font-family:"SF Mono",SFMono-Regular,ui-monospace,monospace;
    font-size:15px;font-weight:700;color:var(--navy);
    background:#fff;border:1px solid var(--line);padding:5px 10px;border-radius:6px;
  }
  .quiz-head .back{
    font-size:12.5px;color:var(--muted);cursor:pointer;text-decoration:underline;
  }
  .progress-bar{
    height:5px;background:#E7E4D8;margin:0 20px 18px;border-radius:3px;overflow:hidden;
  }
  .progress-fill{height:100%;background:var(--amber-deep);border-radius:3px;transition:width .25s;}

  /* --- Question card --- */
  .qcard{
    background:#fff;border:1px solid var(--line);border-radius:12px;
    margin:0 20px;padding:22px 20px;
  }
  .qtext{font-size:16.5px;line-height:1.5;font-weight:600;margin:0 0 18px;}

  .opt{
    display:flex;align-items:flex-start;gap:10px;
    padding:12px 13px;border:1.5px solid var(--line);border-radius:9px;
    margin-bottom:9px;cursor:pointer;font-size:14.5px;line-height:1.4;
    transition:border-color .12s, background .12s;
  }
  .opt:hover{border-color:var(--amber-deep);}
  .opt .letter{
    font-family:"SF Mono",SFMono-Regular,ui-monospace,monospace;
    font-weight:700;color:var(--navy);flex-shrink:0;width:18px;
  }
  .opt.selected-ok{background:var(--ok-bg);border-color:var(--ok);}
  .opt.selected-bad{background:var(--bad-bg);border-color:var(--bad);}
  .opt.reveal-ok{border-color:var(--ok);}
  .opt.disabled{cursor:default;}

  .reveal-btn{
    width:100%;background:var(--navy);color:var(--cream);border:none;
    border-radius:9px;padding:14px;font-size:14.5px;font-weight:700;cursor:pointer;
    margin-top:4px;
  }
  .reveal-btn:active{background:var(--navy-dark);}

  .answer-box{
    background:var(--ok-bg);border:1.5px solid var(--ok);border-radius:9px;
    padding:14px 15px;margin-top:4px;font-size:14.5px;line-height:1.5;
  }
  .answer-box .tag{font-weight:700;color:var(--ok);font-size:12px;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px;}

  .self-grade{display:flex;gap:10px;margin-top:14px;}
  .self-grade button{
    flex:1;padding:12px;border-radius:9px;border:1.5px solid var(--line);
    font-size:14px;font-weight:700;cursor:pointer;background:#fff;
  }
  .self-grade .ok-btn{color:var(--ok);}
  .self-grade .ok-btn:hover{background:var(--ok-bg);border-color:var(--ok);}
  .self-grade .bad-btn{color:var(--bad);}
  .self-grade .bad-btn:hover{background:var(--bad-bg);border-color:var(--bad);}

  .feedback{
    margin-top:14px;padding:12px 14px;border-radius:8px;font-size:13.5px;font-weight:600;
  }
  .feedback.ok{background:var(--ok-bg);color:var(--ok);}
  .feedback.bad{background:var(--bad-bg);color:var(--bad);}

  .next-btn{
    width:100%;background:var(--amber);color:var(--navy);border:none;
    border-radius:9px;padding:14px;font-size:14.5px;font-weight:700;cursor:pointer;
    margin-top:16px;
  }
  .next-btn:active{background:var(--amber-deep);}

  /* --- Results --- */
  .results{padding:20px;}
  .score-hero{
    background:var(--navy);color:var(--cream);border-radius:14px;
    padding:28px 22px;text-align:center;margin-bottom:20px;
  }
  .score-hero .big{
    font-family:"SF Mono",SFMono-Regular,ui-monospace,monospace;
    font-size:44px;font-weight:700;color:var(--amber);
  }
  .score-hero .lbl{font-size:12.5px;color:#B9BEDE;text-transform:uppercase;letter-spacing:.08em;margin-top:4px;}
  .fail-list{
    background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:16px;
  }
  .fail-list h3{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}
  .fail-list .nums{font-family:"SF Mono",SFMono-Regular,ui-monospace,monospace;font-size:14.5px;color:var(--bad);line-height:1.7;}
  .btn-row{display:flex;gap:10px;}
  .btn-row button{
    flex:1;border-radius:9px;padding:13px;font-size:13.5px;font-weight:700;cursor:pointer;border:none;
  }
  .btn-primary{background:var(--amber);color:var(--navy);}
  .btn-secondary{background:#fff;color:var(--navy);border:1.5px solid var(--line) !important;}

  .hidden{display:none;}
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="eyebrow">Vueling · Cabin Crew Exam</div>

  <div id="resultsView" class="hidden results"></div>
</div>

let state = {
  blockKey: null,
  questions: [],
  idx: 0,
  answered: false,
  score: 0,
  failedNums: [],
  isRetry: false
};

function renderPicker(){
  const el = document.getElementById('pickerView');
  let html = '';

  const lastFails = JSON.parse(sessionStorage.getItem('lastFails') || 'null');
  if(lastFails && lastFails.nums.length){
    html += `<div class="retry-card">
      <h3>Repaso disponible</h3>
      <p>Fallaste ${lastFails.nums.length} pregunta${lastFails.nums.length>1?'s':''} en tu última sesión: ${lastFails.nums.join(', ')}</p>
      <button onclick="startRetry()">Repasar solo esas</button>
    </div>`;
  }

  html += '<h2>Elige un bloque</h2>';
  Object.keys(DATA).forEach(key=>{
    const b = DATA[key];
    html += `<div class="block-card" onclick="startBlock('${key}')">
      <div class="block-num mono">${key}</div>
      <div class="block-info">
        <h3>${b.title}</h3>
        <p>${b.questions.length} preguntas</p>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

function goHome(){
  document.getElementById('quizView').classList.add('hidden');
  document.getElementById('resultsView').classList.add('hidden');
  document.getElementById('pickerView').classList.remove('hidden');
  document.getElementById('topTitle').textContent = 'Test por bloques';
  document.getElementById('topSub').textContent = 'Elige un bloque para empezar';
  renderPicker();
}

function startBlock(key){
  state = {
    blockKey:key,
    questions: DATA[key].questions.slice(),
    idx:0, answered:false, score:0, failedNums:[], isRetry:false
  };
  document.getElementById('topTitle').textContent = DATA[key].title;
  document.getElementById('topSub').textContent = 'Bloque ' + key;
  showQuiz();
}

function startRetry(){
  const lastFails = JSON.parse(sessionStorage.getItem('lastFails'));
  const qs = [];
  Object.keys(DATA).forEach(key=>{
    DATA[key].questions.forEach(q=>{
      if(lastFails.nums.includes(q.num)) qs.push(q);
    });
  });
  state = {blockKey:'retry', questions:qs, idx:0, answered:false, score:0, failedNums:[], isRetry:true};
  document.getElementById('topTitle').textContent = 'Repaso de falladas';
  document.getElementById('topSub').textContent = qs.length + ' preguntas';
  showQuiz();
}

function showQuiz(){
  document.getElementById('pickerView').classList.add('hidden');
  document.getElementById('resultsView').classList.add('hidden');
  document.getElementById('quizView').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion(){
  const q = state.questions[state.idx];
  state.answered = false;
  document.getElementById('qNumLabel').textContent = q.num;
  const pct = (state.idx / state.questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';

  let html = `<p class="qtext">${q.text}</p>`;

  if(q.type === 'mc'){
    html += q.options.map(o=>`
      <div class="opt" data-letter="${o.letter}" onclick="selectOption('${o.letter}')">
        <span class="letter mono">${o.letter}</span><span>${o.text}</span>
      </div>`).join('');
  } else if(q.type === 'tf'){
    html += `
      <div class="opt" data-letter="true" onclick="selectOption('true')">
        <span class="letter mono">V</span><span>Verdadero</span>
      </div>
      <div class="opt" data-letter="false" onclick="selectOption('false')">
        <span class="letter mono">F</span><span>Falso</span>
      </div>`;
  } else if(q.type === 'reveal'){
    html += `<button class="reveal-btn" onclick="revealAnswer()">Ver respuesta</button>
      <div id="revealArea"></div>`;
  }

  html += `<div id="feedbackArea"></div>`;
  document.getElementById('qcard').innerHTML = html;
}

function selectOption(letter){
  if(state.answered) return;
  state.answered = true;
  const q = state.questions[state.idx];
  const correct = String(q.correct).toLowerCase() === String(letter).toLowerCase();

  document.querySelectorAll('.opt').forEach(el=>{
    el.classList.add('disabled');
    const isThis = el.dataset.letter === letter;
    const isCorrectOpt = String(el.dataset.letter).toLowerCase() === String(q.correct).toLowerCase();
    if(isThis){ el.classList.add(correct ? 'selected-ok' : 'selected-bad'); }
    if(!correct && isCorrectOpt){ el.classList.add('reveal-ok'); }
  });

  registerResult(correct);
  showFeedback(correct);
}

function revealAnswer(){
  const q = state.questions[state.idx];
  document.querySelector('.reveal-btn').remove();
  document.getElementById('revealArea').innerHTML = `
    <div class="answer-box"><span class="tag">Respuesta</span>${q.answer}</div>
    <div class="self-grade">
      <button class="ok-btn" onclick="selfGrade(true)">✓ Acerté</button>
      <button class="bad-btn" onclick="selfGrade(false)">✗ Fallé</button>
    </div>`;
}

function selfGrade(correct){
  if(state.answered) return;
  state.answered = true;
  document.querySelector('.self-grade').innerHTML = '';
  registerResult(correct);
  showFeedback(correct);
}

function registerResult(correct){
  const q = state.questions[state.idx];
  if(correct){ state.score++; }
  else { state.failedNums.push(q.num); }
}

function showFeedback(correct){
  const area = document.getElementById('feedbackArea');
  area.innerHTML = `<div class="feedback ${correct?'ok':'bad'}">${correct ? '✓ Correcto' : '✗ Incorrecto'}</div>
    <button class="next-btn" onclick="nextQuestion()">${state.idx+1 < state.questions.length ? 'Siguiente' : 'Ver resultado'}</button>`;
}

function nextQuestion(){
  state.idx++;
  if(state.idx >= state.questions.length){
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults(){
  document.getElementById('quizView').classList.add('hidden');
  const el = document.getElementById('resultsView');
  el.classList.remove('hidden');

  const total = state.questions.length;
  const pct = Math.round((state.score/total)*100);

  sessionStorage.setItem('lastFails', JSON.stringify({nums: state.failedNums}));

  let html = `<div class="score-hero">
    <div class="big mono">${state.score}/${total}</div>
    <div class="lbl">${pct}% correcto</div>
  </div>`;

  if(state.failedNums.length){
    html += `<div class="fail-list">
      <h3>Preguntas falladas</h3>
      <div class="nums">${state.failedNums.join(', ')}</div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="startRetry()">Repasar falladas</button>
      <button class="btn-secondary" onclick="goHome()">Volver a bloques</button>
    </div>`;
  } else {
    html += `<div class="fail-list"><h3>¡Sin fallos!</h3></div>
    <div class="btn-row">
      <button class="btn-primary" onclick="goHome()">Volver a bloques</button>
    </div>`;
  }

  el.innerHTML = html;
}
